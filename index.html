<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎂 Abdul Wasay | CZN + Bestfriend | Birthday Celebration 🎂</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #0a0a0a;
        font-family: 'Segoe UI', 'Poppins', 'Dancing Script', cursive, sans-serif;
        color: #fff3e6;
        overflow-x: hidden;
        min-height: 100vh;
    }

    /* Removed the countdown styles completely */
    
    #intro {
        position: fixed;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at center, #1a0010, #000000);
        display: flex;  /* Show intro immediately */
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 100;
        backdrop-filter: blur(2px);
        transition: opacity 1s ease;
    }

    #intro h1 {
        font-size: 3rem;
        background: linear-gradient(135deg, #6effc4, #00b8a9);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow: 0 0 15px rgba(0,184,169,0.4);
        letter-spacing: 2px;
        opacity: 0;
        animation: fadeGlow 2s forwards;
        text-align: center;
        padding: 0 20px;
    }

    #enterBtn {
        margin-top: 2rem;
        padding: 14px 38px;
        font-size: 1.3rem;
        font-weight: bold;
        border: none;
        border-radius: 50px;
        background: linear-gradient(45deg, #00b8a9, #6effc4);
        color: #0a2a2a;
        cursor: pointer;
        box-shadow: 0 0 15px #00b8a9;
        transition: 0.3s;
        opacity: 0;
        animation: fadeGlow 2.5s forwards;
    }

    #enterBtn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 25px #6effc4;
    }

    .container {
        display: none;
        position: relative;
        min-height: 100vh;
        padding: 30px 20px;
        background: rgba(0,0,0,0.7);
        z-index: 2;
        text-align: center;
    }

    .watermark-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
    }

    .watermark-text {
        position: absolute;
        white-space: nowrap;
        font-size: 1.6rem;
        font-weight: bold;
        color: rgba(100, 255, 200, 0.15);
        font-family: 'Courier New', monospace;
        text-transform: uppercase;
        letter-spacing: 2px;
        transform: rotate(-5deg);
        user-select: none;
        pointer-events: none;
        text-shadow: 0 0 6px #00b8a9;
        animation: floatWatermark 20s linear infinite;
    }

    @keyframes floatWatermark {
        0% { transform: translateY(0px) rotate(-5deg); opacity: 0.12; }
        50% { transform: translateY(-15px) rotate(-3deg); opacity: 0.2; }
        100% { transform: translateY(0px) rotate(-5deg); opacity: 0.12; }
    }

    .story-block {
        max-width: 650px;
        margin: 20px auto;
        background: rgba(0, 184, 169, 0.15);
        backdrop-filter: blur(12px);
        padding: 20px 24px;
        border-radius: 60px;
        font-size: 1.3rem;
        font-weight: 500;
        font-family: 'Segoe UI', monospace;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        border: 1px solid rgba(0,255,200,0.3);
        opacity: 0;
        transform: translateY(40px);
        transition: 1s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        letter-spacing: 0.5px;
        text-align: left;
        color: #eafff5;
    }

    .story-block.visible {
        opacity: 1;
        transform: translateY(0);
    }

    button {
        padding: 12px 28px;
        font-size: 1.2rem;
        border: none;
        border-radius: 50px;
        background: linear-gradient(95deg, #00b8a9, #6effc4);
        color: #0a2a2a;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
        box-shadow: 0 4px 12px rgba(0,184,169,0.4);
    }

    button:hover {
        transform: scale(1.02);
        filter: brightness(1.05);
    }

    #startBtn {
        margin: 20px auto;
        font-size: 1.4rem;
        padding: 14px 38px;
    }

    #proposal {
        display: none;
        background: rgba(0,0,0,0.5);
        padding: 30px 20px;
        border-radius: 70px;
        backdrop-filter: blur(8px);
        width: 90%;
        max-width: 500px;
        text-align: center;
        margin: 40px auto 60px auto;
        position: relative;
        border: 1px solid #00b8a9;
    }

    .ring {
        font-size: 5rem;
        margin-bottom: 20px;
        animation: ringGlow 1.5s infinite alternate;
        display: inline-block;
    }

    @keyframes ringGlow {
        0% { text-shadow: 0 0 10px #00b8a9, 0 0 20px #6effc4; transform: scale(1); }
        100% { text-shadow: 0 0 30px #6effc4, 0 0 40px #00b8a9; transform: scale(1.05); }
    }

    #proposal h2 {
        font-size: 2rem;
        margin-bottom: 20px;
        color: #aafff0;
    }

    #noBtn {
        margin-left: 20px;
        background: #2c3e38;
        transition: 0.1s;
        cursor: pointer;
        position: relative;
        z-index: 10;
    }

    .video-container {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        z-index: 300;
        justify-content: center;
        align-items: center;
    }

    #cakeVideo {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
    }

    #images {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        z-index: 200;
        overflow: hidden;
    }

    #images img {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center;
        opacity: 0;
        transition: opacity 2s ease, transform 6s ease;
        transform: scale(1);
    }

    #images img.active {
        opacity: 1;
        transform: scale(1.08);
    }

    .slideshow-text {
        position: fixed;
        bottom: 20%;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.85);
        backdrop-filter: blur(12px);
        padding: 14px 28px;
        border-radius: 60px;
        font-size: 1.7rem;
        font-weight: bold;
        color: #b7ffe6;
        border: 1px solid #00b8a9;
        font-family: 'Courier New', monospace;
        z-index: 250;
        letter-spacing: 2px;
        box-shadow: 0 0 25px #00b8a9;
        text-align: center;
        white-space: nowrap;
        pointer-events: none;
        animation: fadeGlow 0.5s ease;
    }

    @media (max-width: 600px) {
        .slideshow-text {
            font-size: 1.2rem;
            padding: 8px 16px;
            white-space: normal;
            width: 90%;
            bottom: 15%;
        }
        .story-block {
            font-size: 1rem;
            padding: 14px 20px;
        }
        #proposal h2 {
            font-size: 1.6rem;
        }
    }

    .confetti {
        position: fixed;
        top: -20px;
        font-size: 1.8rem;
        pointer-events: none;
        z-index: 999;
        animation: fallConfetti linear forwards;
    }

    @keyframes fallConfetti {
        to {
            transform: translateY(110vh) rotate(360deg);
            opacity: 0;
        }
    }

    @keyframes fadeGlow {
        0% { opacity: 0; text-shadow: 0 0 0px transparent; }
        100% { opacity: 1; text-shadow: 0 0 12px #6effc4; }
    }

    .container > h1 {
        font-size: 2rem;
        background: linear-gradient(120deg, #b5ffe6, #6effc4);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin-bottom: 25px;
        font-weight: bold;
    }
</style>
</head>
<body>

<!-- INTRO SCREEN - Now shown directly, no countdown -->
<div id="intro">
    <h1>⚡ For My Legendary Bro — Abdul Wasay ⚡</h1>
    <button id="enterBtn" onclick="enterSite()">🤝 Enter The Celebration 🤝</button>
</div>

<!-- MAIN CONTENT -->
<div class="container" id="main">

    <button id="startBtn" onclick="startParty()">🎂 Start Birthday Journey 🎂</button>

<div id="images">

<script>
// ----------------------------- NO COUNTDOWN - DIRECT START -----------------------------
// The intro is already visible, no timer needed

// ----------------------------- WATERMARK -----------------------------
function createWatermarkText() {
    const watermarkContainer = document.getElementById('watermarkWrapper');
    if (!watermarkContainer) return;
    watermarkContainer.innerHTML = '';
    const phrases = ['WASAY THE GREAT 💥', 'BRO CODE 🔥', 'CZN + BESTIE 🎂', 'ABDUL WASAY 👑', 'PHOPHO ZAD LEGEND'];
    for (let i = 0; i < 36; i++) {
        const span = document.createElement('div');
        span.classList.add('watermark-text');
        let text = phrases[i % phrases.length];
        span.innerText = text;
        const leftPos = Math.random() * 100;
        const topPos = Math.random() * 100;
        const rotation = (Math.random() * 20) - 10;
        const fontSize = 1 + Math.random() * 1.4;
        span.style.left = leftPos + '%';
        span.style.top = topPos + '%';
        span.style.transform = `rotate(${rotation}deg)`;
        span.style.fontSize = fontSize + 'rem';
        span.style.animationDuration = 15 + Math.random() * 15 + 's';
        watermarkContainer.appendChild(span);
    }
}

function enterSite() {
    const intro = document.getElementById('intro');
    const mainDiv = document.getElementById('main');
    intro.style.display = 'none';
    mainDiv.style.display = 'block';
    createWatermarkText();
    startSubtleDopeRain();
}

let dopeInterval;
function startSubtleDopeRain() {
    if (dopeInterval) clearInterval(dopeInterval);
    dopeInterval = setInterval(() => {
        const emoji = document.createElement('div');
        const random = Math.random();
        if (random > 0.6) emoji.innerHTML = '⚡';
        else if (random > 0.3) emoji.innerHTML = '🤜';
        else emoji.innerHTML = '🔥';
        emoji.style.position = 'fixed';
        emoji.style.left = Math.random() * 100 + '%';
        emoji.style.bottom = '-20px';
        emoji.style.fontSize = (Math.random() * 18 + 14) + 'px';
        emoji.style.opacity = 0.6;
        emoji.style.pointerEvents = 'none';
        emoji.style.zIndex = '998';
        emoji.style.animation = 'floatUp 7s ease-out forwards';
        document.body.appendChild(emoji);
        setTimeout(() => emoji.remove(), 7000);
    }, 850);
}
const styleSheet = document.createElement("style");
styleSheet.textContent = `
    @keyframes floatUp {
        0% { transform: translateY(0) rotate(0deg); opacity: 0.7; }
        100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
    }
`;
document.head.appendChild(styleSheet);

// ----------------------------- STORY MESSAGES (CZN + BESTFRIEND) -----------------------------
const storyMessages = [
    "🧬 Tu mera PHOPHO ZAD CZN hai — blood relation, khandaan ka hissa.",
    "🤜 Lekin tu mera BEST FRIEND bhi hai — by my own choice, apni marzi se. 💖",
    "🎯 I don't care how many friends you have, lekin tu mere TOP TWO mein hai. Always.",
    "😂🙃 Feeling some jealousy sometimes when I see you with your other best friend... but I know every person has its own place.",
    "🫀 BEST WISHES for you. Enjoy your day! Once again JANAM DIN MUBARAK Abdul Wasay!",
    "😶 Ye sab main kabhi samnay nahi keh sakta... na itni himmat. Aur main jaanta hoon kabhi kahunga nahi.",
    "💔 Sorry agar kuch zyada keh diya. HAPPY BIRTHDAY SHAHZADAY BHAI MERE! Tu special hai mere liye.",
    "🌹 تمہاری سالگرہ کے دن یہ دعا ہے ہماری, جتنے ہیں چاند تارے اتنی ہو عمر تمہاری. ♥️"
];

const storyDiv = document.getElementById('story');
storyMessages.forEach((msg, idx) => {
    let block = document.createElement('div');
    block.className = 'story-block';
    block.id = `storyBlock${idx}`;
    storyDiv.appendChild(block);
});

let currentStoryIndex = 0;

function typeWriterEffect(element, text, callback) {
    let i = 0;
    element.innerHTML = '';
    function typing() {
        if (i < text.length) {
            element.innerHTML += text[i];
            i++;
            setTimeout(typing, 35);
        } else {
            if (callback) callback();
        }
    }
    typing();
}

function displayNextStory() {
    if (currentStoryIndex < storyMessages.length) {
        const block = document.getElementById(`storyBlock${currentStoryIndex}`);
        block.classList.add('visible');
        typeWriterEffect(block, storyMessages[currentStoryIndex], () => {
            currentStoryIndex++;
            setTimeout(displayNextStory, 700);
        });
    } else {
        document.getElementById('startBtn').style.display = 'none';
        const proposal = document.getElementById('proposal');
        proposal.style.display = 'block';
        proposal.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
}

function startParty() {
    const startBtn = document.getElementById('startBtn');
    startBtn.style.display = 'none';
    const music = document.getElementById('bgMusic');
    music.play().catch(e => console.log("autoplay blocked"));
    startConfettiRainBros();
    displayNextStory();
}

let confettiIntervalBros;
function startConfettiRainBros() {
    if (confettiIntervalBros) clearInterval(confettiIntervalBros);
    confettiIntervalBros = setInterval(() => {
        for (let i = 0; i < 4; i++) {
            const conf = document.createElement('div');
            conf.className = 'confetti';
            const symbols = ['⚡', '🎂', '🔥', '🤜', '🤛', '💥', '🏆', '👑'];
            conf.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
            conf.style.left = Math.random() * 100 + '%';
            conf.style.fontSize = (Math.random() * 24 + 14) + 'px';
            conf.style.animationDuration = (Math.random() * 3 + 2.5) + 's';
            document.body.appendChild(conf);
            setTimeout(() => conf.remove(), 5500);
        }
    }, 280);
}

let moveNoTimeout = null;
function moveNo(event) {
    if (event) {
        event.preventDefault();
        event.stopPropagation();
        if (event.type === 'touchstart') {
            event.target.addEventListener('click', function preventClick(e) {
                e.preventDefault();
                e.stopPropagation();
                event.target.removeEventListener('click', preventClick);
            }, { once: true, capture: true });
        }
    }
    if (moveNoTimeout) clearTimeout(moveNoTimeout);
    moveNoTimeout = setTimeout(() => { moveNoTimeout = null; }, 300);
    const btn = document.getElementById('noBtn');
    const proposal = document.getElementById('proposal');
    const rect = proposal.getBoundingClientRect();
    const btnWidth = btn.offsetWidth;
    const btnHeight = btn.offsetHeight;
    const maxX = rect.width - btnWidth - 20;
    const maxY = rect.height - btnHeight - 20;
    let newLeft = Math.random() * Math.max(0, maxX);
    let newTop = Math.random() * Math.max(0, maxY);
    const yesBtn = document.querySelector('#proposal button:first-of-type');
    const yesRect = yesBtn.getBoundingClientRect();
    let overlap = true;
    let attempts = 0;
    while (overlap && attempts < 15) {
        newLeft = Math.random() * Math.max(0, maxX);
        newTop = Math.random() * Math.max(0, maxY);
        const potentialRect = {
            left: rect.left + newLeft,
            right: rect.left + newLeft + btnWidth,
            top: rect.top + newTop,
            bottom: rect.top + newTop + btnHeight
        };
        if (potentialRect.right > yesRect.left && potentialRect.left < yesRect.right &&
            potentialRect.bottom > yesRect.top && potentialRect.top < yesRect.bottom) {
            attempts++;
            continue;
        }
        overlap = false;
    }
    btn.style.position = 'absolute';
    btn.style.left = newLeft + 'px';
    btn.style.top = newTop + 'px';
    btn.style.marginLeft = '0';
    btn.style.transform = 'scale(0.9)';
    setTimeout(() => { btn.style.transform = ''; }, 150);
    const broMessage = document.createElement('div');
    broMessage.innerText = '🌀 Bro code says: you cannot escape this legendary friendship 🌀';
    broMessage.style.position = 'fixed';
    broMessage.style.bottom = '30%';
    broMessage.style.left = '50%';
    broMessage.style.transform = 'translateX(-50%)';
    broMessage.style.background = 'rgba(0,0,0,0.8)';
    broMessage.style.backdropFilter = 'blur(12px)';
    broMessage.style.padding = '10px 20px';
    broMessage.style.borderRadius = '50px';
    broMessage.style.fontSize = '1.2rem';
    broMessage.style.color = '#b3ffec';
    broMessage.style.zIndex = '1000';
    broMessage.style.whiteSpace = 'nowrap';
    document.body.appendChild(broMessage);
    setTimeout(() => broMessage.remove(), 1500);
    return false;
}

function yesClicked() {
    const mainChildren = document.querySelectorAll('#main > *');
    mainChildren.forEach(child => {
        if (!child.classList?.contains('watermark-bg') && child.id !== 'watermarkWrapper') {
            child.style.display = 'none';
        }
    });
    const videoContainer = document.getElementById('videoContainer');
    const video = document.getElementById('cakeVideo');
    videoContainer.style.display = 'flex';
    video.muted = false;
    
    video.addEventListener('ended', function onEnded() {
        video.removeEventListener('ended', onEnded);
        videoContainer.style.display = 'none';
        startBroSlideshow();
    });
    video.addEventListener('error', function onError() {
        videoContainer.style.display = 'none';
        startBroSlideshow();
    });
    video.play().catch(e => {
        console.log("Video error", e);
        videoContainer.style.display = 'none';
        startBroSlideshow();
    });
}

function startBroSlideshow() {
    const slideshowDiv = document.getElementById('images');
    const images = document.querySelectorAll('#images img');
    
    if (images.length === 0) {
        console.error("No images found!");
        return;
    }
    
    slideshowDiv.style.display = 'block';
    
    images.forEach(img => {
        img.classList.remove('active');
        img.onerror = function() {
            console.log("Image failed to load:", this.src);
        };
    });
    
    let idx = 0;
    if (images.length > 0) {
        images[0].classList.add('active');
    }
    
    function showNextImage() {
        if (images.length === 0) return;
        images.forEach(img => img.classList.remove('active'));
        idx = (idx + 1) % images.length;
        images[idx].classList.add('active');
    }
    
    const slideInterval = setInterval(showNextImage, 3800);
    window.slideInterval = slideInterval;
    
    const textLines = [
        "🎂 HAPPY BIRTHDAY ABDUL WASAY! CZN + BESTFRIEND 🎂",
        "🤜🤛 Blood relation + Bestfriend by choice = LEGENDARY 🤛🤜",
        "💥 Tu mere TOP TWO mein hai — hamesha yaad rakhna 💥",
        "🙃 Thodi jealousy, lekin pyaar zyada — you're my brother 🙃",
        "🫀 BEST WISHES! Enjoy your day king 👑",
        "😶 Jo main keh nahi sakta, ye slideshow wo alfaaz hai 😶",
        "🌹 Jitne chaand taare, utni ho umar teri 🌹",
        "💖 LOVE YOU BHAI — PHOPHO ZAD CZN FOREVER 💖"
    ];
    
    let textDiv = document.querySelector('.slideshow-text');
    if (!textDiv) {
        textDiv = document.createElement('div');
        textDiv.className = 'slideshow-text';
        document.body.appendChild(textDiv);
    }
    
    let textIndex = 0;
    function updateText() {
        textDiv.innerText = textLines[textIndex % textLines.length];
        textIndex++;
    }
    updateText();
    
    if (window.textInterval) clearInterval(window.textInterval);
    window.textInterval = setInterval(updateText, 3800);
}

function startHeartbeatGlow() {
    setInterval(() => {
        const mainDiv = document.getElementById('main');
        if (mainDiv && mainDiv.style.display === 'block') {
            const overlay = document.createElement('div');
            overlay.style.position = 'fixed';
            overlay.style.top = 0;
            overlay.style.left = 0;
            overlay.style.width = '100%';
            overlay.style.height = '100%';
            overlay.style.background = 'radial-gradient(circle, rgba(0,184,169,0.08) 0%, rgba(0,0,0,0) 80%)';
            overlay.style.pointerEvents = 'none';
            overlay.style.zIndex = '1';
            document.body.appendChild(overlay);
            setTimeout(() => overlay.remove(), 500);
        }
    }, 4500);
}

window.addEventListener('load', () => {
    startHeartbeatGlow();
    console.log("Page loaded - celebration ready! No countdown.");
});
</script>
</body>
</html>
